{# Base layout: header nav + page content block. demo_mode shows a badge when API calls are skipped. #}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Book Scene Viz{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">Book Scene Viz</a>
    <nav>
      <a href="/">New scan</a>
      <a href="/gallery">Gallery</a>
    </nav>
    {% if demo_mode %}
    <span class="badge">Demo mode</span>
    {% endif %}
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
